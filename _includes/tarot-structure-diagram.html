<figure class="diagram-figure diagram-structure-figure">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" role="img" aria-label="Tarot 78-card structure" width="900" height="360">
  <rect width="900" height="360" rx="16" fill="#F5F7F3" stroke="#C8D4C0" stroke-width="1.5"/>
  <text x="450" y="36" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="22" fill="#4A5A45" font-weight="bold">Tarot · 78 张</text>
  <text x="450" y="58" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="13" fill="#7A8A75">大阿卡纳 22 + 小阿卡纳 56</text>

  <rect x="40" y="80" width="260" height="240" rx="12" fill="#D4E0D0" stroke="#7A9078" stroke-width="2"/>
  <text x="170" y="110" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="16" fill="#2F3D2B" font-weight="bold">大阿卡纳</text>
  <text x="170" y="132" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="12" fill="#5A6A58">Major Arcana</text>
  <text x="170" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#2F3D2B" font-weight="bold">22</text>
  <text x="170" y="188" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="11" fill="#4A5A45">0 愚者 → XXI 世界</text>
  <text x="170" y="208" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="11" fill="#4A5A45">人生原型</text>
  <text x="170" y="228" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="11" fill="#4A5A45">愚人之旅</text>

  <rect x="330" y="80" width="530" height="240" rx="12" fill="#E8EDE5" stroke="#B8C8B0" stroke-width="2"/>
  <text x="595" y="110" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="16" fill="#4A5A45" font-weight="bold">小阿卡纳</text>
  <text x="595" y="132" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="12" fill="#7A8A75">Minor Arcana · 56 张</text>

  <rect x="350" y="150" width="115" height="70" rx="8" fill="#B8C8B0"/>
  <text x="407" y="178" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="13" fill="#2F3D2B" font-weight="bold">权杖</text>
  <text x="407" y="198" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="10" fill="#4A5A45">火 · 14</text>

  <rect x="480" y="150" width="115" height="70" rx="8" fill="#B8C8B0"/>
  <text x="537" y="178" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="13" fill="#2F3D2B" font-weight="bold">圣杯</text>
  <text x="537" y="198" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="10" fill="#4A5A45">水 · 14</text>

  <rect x="610" y="150" width="115" height="70" rx="8" fill="#B8C8B0"/>
  <text x="667" y="178" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="13" fill="#2F3D2B" font-weight="bold">宝剑</text>
  <text x="667" y="198" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="10" fill="#4A5A45">风 · 14</text>

  <rect x="740" y="150" width="100" height="70" rx="8" fill="#B8C8B0"/>
  <text x="790" y="178" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="13" fill="#2F3D2B" font-weight="bold">星币</text>
  <text x="790" y="198" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="10" fill="#4A5A45">土 · 14</text>

  <text x="595" y="260" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="11" fill="#7A8A75">Ace–10 + 侍从 / 骑士 / 皇后 / 国王</text>
  <text x="595" y="282" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="11" fill="#7A8A75">14 × 4 花色 = 56</text>

  <text x="450" y="340" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="12" fill="#7A8A75" font-style="italic">22 + 56 = 78 张</text>
</svg>
<figcaption>{{ include.caption | default: "图 — 大阿卡纳 22 + 小阿卡纳 56（权杖/圣杯/宝剑/星币各 14）" }}</figcaption>
</figure>
