<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" role="img" aria-label="The Algorithm five-step sequence">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F5F7F3"/>
      <stop offset="100%" stop-color="#E8EDE5"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#7A8A75" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7A8A75"/>
    </marker>
  </defs>
  <rect width="900" height="320" rx="16" fill="url(#bg)" stroke="#C8D4C0" stroke-width="1.5"/>
  <text x="450" y="36" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#4A5A45" font-weight="bold">The Algorithm - Strict Sequence</text>
  <text x="450" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7A8A75">Order is non-negotiable | Weekly cadence | Automate LAST</text>

  <g filter="url(#shadow)">
    <rect x="30" y="100" width="140" height="90" rx="12" fill="#B8C8B0" stroke="#9CB098"/>
    <text x="100" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2F3D2B" font-weight="bold">1. Question</text>
    <text x="100" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4A5A45">Every requirement</text>
    <text x="100" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4A5A45">Named owner + why</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="200" y="100" width="140" height="90" rx="12" fill="#A8B8A0" stroke="#8FA88F"/>
    <text x="270" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2F3D2B" font-weight="bold">2. Delete</text>
    <text x="270" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4A5A45">Every possible step</text>
    <text x="270" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4A5A45">Default to zero</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="370" y="100" width="140" height="90" rx="12" fill="#9CB098" stroke="#7A9078"/>
    <text x="440" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2F3D2B" font-weight="bold">3. Simplify</text>
    <text x="440" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2F3D2B">Then optimize</text>
    <text x="440" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2F3D2B">Products, process, org</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="540" y="100" width="140" height="90" rx="12" fill="#8FA88F" stroke="#6A8068"/>
    <text x="610" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#F5F7F3" font-weight="bold">4. Accelerate</text>
    <text x="610" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#E8EDE5">Cycle time</text>
    <text x="610" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#E8EDE5">Idea to cash faster</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="710" y="100" width="140" height="90" rx="12" fill="#7A9078" stroke="#5A6A58"/>
    <text x="780" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#F5F7F3" font-weight="bold">5. Automate</text>
    <text x="780" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#E8EDE5">LAST only</text>
    <text x="780" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#E8EDE5">After process proven</text>
  </g>

  <line x1="170" y1="145" x2="198" y2="145" stroke="#7A8A75" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="145" x2="368" y2="145" stroke="#7A8A75" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="510" y1="145" x2="538" y2="145" stroke="#7A8A75" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="680" y1="145" x2="708" y2="145" stroke="#7A8A75" stroke-width="2.5" marker-end="url(#arrow)"/>

  <path d="M780 200 C780 250, 100 250, 100 192" fill="none" stroke="#9CB098" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text x="450" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7A8A75">Weekly cadence: repeat on every process, product, and team</text>

  <rect x="250" y="220" width="400" height="34" rx="8" fill="#E8EDE5" stroke="#C8D4C0"/>
  <text x="450" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5A6A58">Model 3 lesson: skipping to Step 5 first broke production</text>
</svg>
