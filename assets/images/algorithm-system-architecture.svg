<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-label="The Algorithm organizational system architecture">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7A8A75"/>
    </marker>
  </defs>
  <rect width="900" height="520" rx="16" fill="#F5F7F3" stroke="#C8D4C0" stroke-width="1.5"/>
  <text x="450" y="34" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#4A5A45" font-weight="bold">System Architecture - How The Algorithm Runs in an Org</text>
  <text x="450" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7A8A75">Control loop | Not a one-time project</text>

  <rect x="120" y="75" width="660" height="68" rx="10" fill="#7A9078" stroke="#5A6A58"/>
  <text x="450" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#F5F7F3" font-weight="bold">LAYER 1 - Executive Mandate</text>
  <text x="450" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#E8EDE5">CEO / Board air cover | Crisis or hypergrowth trigger</text>

  <line x1="450" y1="143" x2="450" y2="163" stroke="#7A8A75" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="120" y="165" width="660" height="68" rx="10" fill="#9CB098" stroke="#7A9078"/>
  <text x="450" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2F3D2B" font-weight="bold">LAYER 2 - Weekly Operating Cadence</text>
  <text x="450" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2F3D2B">Recurring review cycle | Every team runs Q-D-S-A-Auto on active work</text>

  <line x1="450" y1="233" x2="450" y2="253" stroke="#7A8A75" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="60" y="255" width="780" height="120" rx="12" fill="#E8EDE5" stroke="#B8C8B0" stroke-width="2"/>
  <text x="450" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#4A5A45" font-weight="bold">LAYER 3 - Execution Engine (Cross-Functional Teams)</text>

  <rect x="90" y="295" width="130" height="60" rx="8" fill="#B8C8B0"/>
  <text x="155" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2F3D2B" font-weight="bold">Engineering</text>
  <text x="155" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4A5A45">Delete parts</text>

  <rect x="240" y="295" width="130" height="60" rx="8" fill="#B8C8B0"/>
  <text x="305" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2F3D2B" font-weight="bold">Operations</text>
  <text x="305" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4A5A45">Delete steps</text>

  <rect x="390" y="295" width="130" height="60" rx="8" fill="#B8C8B0"/>
  <text x="455" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2F3D2B" font-weight="bold">Sales / GTM</text>
  <text x="455" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4A5A45">Delete friction</text>

  <rect x="540" y="295" width="130" height="60" rx="8" fill="#B8C8B0"/>
  <text x="605" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2F3D2B" font-weight="bold">Legal / Finance</text>
  <text x="605" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4A5A45">Delete pages</text>

  <rect x="690" y="295" width="130" height="60" rx="8" fill="#B8C8B0"/>
  <text x="755" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2F3D2B" font-weight="bold">Product</text>
  <text x="755" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4A5A45">Delete features</text>

  <line x1="450" y1="375" x2="450" y2="395" stroke="#7A8A75" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="120" y="397" width="660" height="68" rx="10" fill="#D4E0D0" stroke="#9CB098"/>
  <text x="450" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2F3D2B" font-weight="bold">LAYER 4 - Outputs (Measurable)</text>
  <text x="450" y="444" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4A5A45">Shorter cycle time | Fewer parts/steps | Higher throughput</text>

  <path d="M120 431 C40 431, 40 109, 120 109" fill="none" stroke="#9CB098" stroke-width="2" stroke-dasharray="7 4" marker-end="url(#arr)"/>
  <text x="52" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7A8A75" transform="rotate(-90 52 270)">Feedback</text>

  <rect x="60" y="478" width="380" height="30" rx="6" fill="#fff" stroke="#C8D4C0"/>
  <text x="250" y="498" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5A6A58">IN SCOPE: process, product, org, contracts</text>
  <rect x="460" y="478" width="380" height="30" rx="6" fill="#fff" stroke="#C8D4C0"/>
  <text x="650" y="498" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5A6A58">OUT OF SCOPE: personal life, leadership mimicry</text>
</svg>
