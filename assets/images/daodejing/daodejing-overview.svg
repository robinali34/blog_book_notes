<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" role="img" aria-label="道德经思想总览">
  <rect width="900" height="340" rx="12" fill="#F5F7F3" stroke="#C8D4C0"/>
  <text x="450" y="36" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="20" fill="#4A5A45" font-weight="bold">道德经 · 道法自然</text>
  <text x="450" y="58" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="12" fill="#7A8A75">道 · 德 · 无为 · 柔弱 · 反者道之动</text>
  <ellipse cx="450" cy="175" rx="110" ry="70" fill="none" stroke="#9CB098" stroke-width="2"/>
  <text x="450" y="172" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="16" fill="#4A5A45" font-weight="bold">道</text>
  <text x="450" y="192" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="10" fill="#7A8A75">无名 · 自然 · 不可名</text>
  <rect x="80" y="88" width="130" height="50" rx="8" fill="#D4E0D0" stroke="#7A9078"/>
  <text x="145" y="118" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="12" fill="#2F3D2B" font-weight="bold">无为</text>
  <rect x="690" y="88" width="130" height="50" rx="8" fill="#D4E0D0" stroke="#7A9078"/>
  <text x="755" y="118" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="12" fill="#2F3D2B" font-weight="bold">柔弱</text>
  <rect x="80" y="218" width="130" height="50" rx="8" fill="#D4E0D0" stroke="#7A9078"/>
  <text x="145" y="248" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="12" fill="#2F3D2B" font-weight="bold">知足</text>
  <rect x="690" y="218" width="130" height="50" rx="8" fill="#D4E0D0" stroke="#7A9078"/>
  <text x="755" y="248" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="12" fill="#2F3D2B" font-weight="bold">反者道之动</text>
  <rect x="385" y="248" width="130" height="44" rx="8" fill="#7A9078"/>
  <text x="450" y="276" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="12" fill="#F5F7F3" font-weight="bold">圣人不争</text>
  <text x="450" y="320" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="11" fill="#7A8A75" font-style="italic">上德不德 · 治大国若烹小鲜 · 水善利万物而不争</text>
</svg>
