<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" role="img" aria-label="New Rules of Lifting program arc">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4F6F8"/>
      <stop offset="100%" stop-color="#E8ECF0"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#5A6A78" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5A6A78"/>
    </marker>
  </defs>
  <rect width="900" height="300" rx="16" fill="url(#bg)" stroke="#C5CDD6" stroke-width="1.5"/>
  <text x="450" y="34" text-anchor="middle" font-family="Georgia, serif" font-size="21" fill="#2C3E50" font-weight="bold">The New Rules of Lifting  Stage Arc</text>
  <text x="450" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5A6A78">Vary reps &amp; loads · basic patterns · planned recovery · fat-loss breaks</text>
  <g filter="url(#shadow)">
    <rect x="40" y="90" width="170" height="120" rx="10" fill="#D8E2EC" stroke="#A8B8C8"/>
    <text x="125" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2C3E50" font-weight="bold">Stage I</text>
    <text x="125" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4A5A68">Hypertrophy</text>
    <text x="125" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4A5A68">Higher reps</text>
    <text x="125" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4A5A68">Learn patterns</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="240" y="90" width="170" height="120" rx="10" fill="#C8D8E8" stroke="#98A8B8"/>
    <text x="325" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2C3E50" font-weight="bold">Stage II</text>
    <text x="325" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4A5A68">Strength</text>
    <text x="325" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4A5A68">Lower reps</text>
    <text x="325" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4A5A68">Heavier loads</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="440" y="90" width="170" height="120" rx="10" fill="#B8C8D8" stroke="#8898A8"/>
    <text x="525" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2C3E50" font-weight="bold">Stage III</text>
    <text x="525" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4A5A68">Metabolic</text>
    <text x="525" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4A5A68">Density / circuits</text>
    <text x="525" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4A5A68">Conditioning</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="640" y="90" width="220" height="120" rx="10" fill="#A8B8C8" stroke="#788898"/>
    <text x="750" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#F4F6F8" font-weight="bold">Stage IV + breaks</text>
    <text x="750" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#E8ECF0">Power / athletic</text>
    <text x="750" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#E8ECF0">Fat-loss phases between</text>
    <text x="750" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#E8ECF0">Repeat cycle</text>
  </g>
  <line x1="210" y1="150" x2="240" y2="150" stroke="#5A6A78" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="410" y1="150" x2="440" y2="150" stroke="#5A6A78" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="610" y1="150" x2="640" y2="150" stroke="#5A6A78" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="450" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5A6A78">Squat · hinge · push · pull · core  dumbbells, barbells, bodyweight</text>
</svg>
