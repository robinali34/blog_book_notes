<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 340" width="920" height="340" role="img" aria-label="Starting Strength novice program overview">
  <defs>
    <linearGradient id="ss-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4F6F8"/>
      <stop offset="100%" stop-color="#E8ECF0"/>
    </linearGradient>
    <filter id="ss-shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#5A6A78" flood-opacity="0.15"/>
    </filter>
    <marker id="ss-arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5A6A78"/>
    </marker>
  </defs>
  <rect width="920" height="340" rx="16" fill="url(#ss-bg)" stroke="#C5CDD6" stroke-width="1.5"/>
  <text x="460" y="36" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#2C3E50" font-weight="bold">Starting Strength - Novice Linear Progression</text>
  <text x="460" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5A6A78">3 sessions / week | A/B alternation | add weight every workout</text>

  <g filter="url(#ss-shadow)">
    <rect x="40" y="90" width="380" height="200" rx="12" fill="#D8E2EC" stroke="#A8B8C8"/>
    <text x="230" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2C3E50" font-weight="bold">Workout A</text>
    <text x="70" y="148" font-family="Arial, sans-serif" font-size="13" fill="#2C3E50">Squat 3x5</text>
    <text x="70" y="172" font-family="Arial, sans-serif" font-size="13" fill="#2C3E50">Press 3x5</text>
    <text x="70" y="196" font-family="Arial, sans-serif" font-size="13" fill="#2C3E50">Deadlift 1x5</text>
    <text x="230" y="148" font-family="Arial, sans-serif" font-size="13" fill="#2C3E50">Workout B</text>
    <text x="230" y="172" font-family="Arial, sans-serif" font-size="13" fill="#2C3E50">Squat 3x5</text>
    <text x="230" y="196" font-family="Arial, sans-serif" font-size="13" fill="#2C3E50">Bench 3x5</text>
    <text x="230" y="220" font-family="Arial, sans-serif" font-size="13" fill="#2C3E50">Power Clean 5x3</text>
    <text x="230" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5A6A78">Mon A / Wed B / Fri A (example week)</text>
  </g>

  <g filter="url(#ss-shadow)">
    <rect x="500" y="90" width="380" height="200" rx="12" fill="#C8D8E8" stroke="#98A8B8"/>
    <text x="690" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2C3E50" font-weight="bold">Linear Progression</text>
    <text x="530" y="152" font-family="Arial, sans-serif" font-size="13" fill="#2C3E50">Squat / Press / Bench: +5 lb per session</text>
    <text x="530" y="176" font-family="Arial, sans-serif" font-size="13" fill="#2C3E50">Deadlift: +10 lb per session</text>
    <text x="530" y="200" font-family="Arial, sans-serif" font-size="13" fill="#2C3E50">Power Clean: +2.5 lb per session</text>
    <text x="530" y="232" font-family="Arial, sans-serif" font-size="12" fill="#5A6A78">Reset or microload when reps fail</text>
    <text x="530" y="256" font-family="Arial, sans-serif" font-size="12" fill="#5A6A78">Ends when recovery cannot keep pace</text>
  </g>

  <line x1="420" y1="190" x2="500" y2="190" stroke="#5A6A78" stroke-width="2" marker-end="url(#ss-arrow)"/>
  <text x="460" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5A6A78">Technique first | full ROM | consistent rest | eat and sleep to recover</text>
</svg>
