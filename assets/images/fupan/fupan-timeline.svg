<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280" role="img" aria-label="复盘时间轴">
  <rect width="900" height="280" rx="12" fill="#F5F7F3" stroke="#C8D4C0"/>
  <text x="450" y="36" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" fill="#4A5A45" font-weight="bold">复盘时间轴</text>
  <defs><marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#7A8A75"/></marker></defs>
  <text x="450" y="58" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#7A8A75">日 → 周 → 项目 T+1/T+7 → 月季年</text>
  <rect x="180" y="110" width="120" height="50" rx="8" fill="#D4E0D0" stroke="#7A9078"/>
  <text x="240.0" y="140" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2F3D2B" font-weight="bold">日复盘</text>
  <line x1="300" y1="135" x2="320" y2="135" stroke="#7A8A75" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="320" y="110" width="120" height="50" rx="8" fill="#D4E0D0" stroke="#7A9078"/>
  <text x="380.0" y="140" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2F3D2B" font-weight="bold">周复盘</text>
  <line x1="440" y1="135" x2="460" y2="135" stroke="#7A8A75" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="460" y="110" width="120" height="50" rx="8" fill="#D4E0D0" stroke="#7A9078"/>
  <text x="520.0" y="140" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2F3D2B" font-weight="bold">项目复盘</text>
  <line x1="580" y1="135" x2="600" y2="135" stroke="#7A8A75" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="600" y="110" width="120" height="50" rx="8" fill="#D4E0D0" stroke="#7A9078"/>
  <text x="660.0" y="140" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2F3D2B" font-weight="bold">月季年</text>
  <text x="450" y="260" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#7A8A75">节奏递进 · 战略复盘</text>
</svg>
