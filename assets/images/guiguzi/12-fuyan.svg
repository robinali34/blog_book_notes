<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" role="img" aria-label="符言篇示意图">
  <rect width="800" height="200" rx="12" fill="#F5F7F3" stroke="#C8D4C0"/>
  <text x="400" y="32" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="18" fill="#4A5A45" font-weight="bold">符言篇 · 持符守信</text>
  <rect x="350" y="70" width="100" height="100" rx="6" fill="#B8C8B0" stroke="#7A9078" stroke-width="2"/>
  <text x="400" y="115" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="28" fill="#2F3D2B" font-weight="bold">符</text>
  <text x="400" y="140" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="11" fill="#4A5A45">信符 · 契约</text>
  <circle cx="180" cy="100" r="28" fill="#E8EDE5" stroke="#9CB098"/>
  <text x="180" y="106" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#4A5A45">耳</text>
  <text x="180" y="145" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="10" fill="#7A8A75">听声</text>
  <circle cx="260" cy="100" r="28" fill="#E8EDE5" stroke="#9CB098"/>
  <text x="260" y="106" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#4A5A45">目</text>
  <text x="260" y="145" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="10" fill="#7A8A75">观色</text>
  <circle cx="540" cy="100" r="28" fill="#E8EDE5" stroke="#9CB098"/>
  <text x="540" y="106" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#4A5A45">心</text>
  <text x="540" y="145" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="10" fill="#7A8A75">知情</text>
  <circle cx="620" cy="100" r="28" fill="#D4E0D0" stroke="#7A9078"/>
  <text x="620" y="106" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="14" fill="#2F3D2B">位</text>
  <text x="620" y="145" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="10" fill="#7A8A75">守分</text>
  <text x="400" y="190" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="11" fill="#7A8A75">安徐正静 · 耳目心协调 · 各守其符</text>
</svg>
