<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300" role="img" aria-label="Personal growth three tracks">
  <rect width="900" height="300" rx="12" fill="#F5F7F3" stroke="#C8D4C0"/>
  <text x="450" y="36" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="20" fill="#4A5A45" font-weight="bold">Personal Growth - Three Tracks</text>
  <text x="450" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7A8A75">Body - Mind - Relate - one weekly rhythm</text>
  <rect x="60" y="100" width="220" height="120" rx="10" fill="#D4E0D0" stroke="#7A9078"/>
  <text x="170" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#2F3D2B" font-weight="bold">BODY</text>
  <text x="170" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4A5A45">sleep / move / sensory</text>
  <text x="170" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7A8A75">recovery</text>
  <rect x="340" y="100" width="220" height="120" rx="10" fill="#D4E0D0" stroke="#7A9078"/>
  <text x="450" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#2F3D2B" font-weight="bold">MIND</text>
  <text x="450" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4A5A45">journal / review / lenses</text>
  <text x="450" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7A8A75">self-understanding</text>
  <rect x="620" y="100" width="220" height="120" rx="10" fill="#D4E0D0" stroke="#7A9078"/>
  <text x="730" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#2F3D2B" font-weight="bold">RELATE</text>
  <text x="730" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4A5A45">listen / boundaries / people log</text>
  <text x="730" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7A8A75">EQ and networking</text>
  <line x1="280" y1="160" x2="340" y2="160" stroke="#9CB098" stroke-width="2"/>
  <line x1="560" y1="160" x2="620" y2="160" stroke="#9CB098" stroke-width="2"/>
  <rect x="300" y="240" width="300" height="44" rx="8" fill="#7A9078"/>
  <text x="450" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#F5F7F3" font-weight="bold">Weekly: move 3x - retro 1x - connect 1x</text>
</svg>
