<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" role="img" aria-label="Middle class as ideology">
  <rect width="880" height="400" rx="14" fill="#F5F7F3" stroke="#C8D4C0"/>
  <text x="440" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#4A5A45" font-weight="bold">Middle Class Ideology — Weiss</text>
  <text x="440" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7A8A75">Workers invest in credentials · property · pensions → compete as owners → fuel accumulation</text>

  <rect x="40" y="80" width="240" height="100" rx="10" fill="#D4E0D0" stroke="#7A9078"/>
  <text x="160" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2F3D2B" font-weight="bold">State promise</text>
  <text x="160" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4A5A45">Meritocracy</text>
  <text x="160" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4A5A45">Home ownership</text>
  <text x="160" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4A5A45">Professional credentials</text>

  <text x="300" y="135" font-family="Arial, sans-serif" font-size="22" fill="#7A8A75">→</text>

  <rect x="330" y="80" width="220" height="100" rx="10" fill="#E8EDE5" stroke="#A8B8A0"/>
  <text x="440" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2F3D2B" font-weight="bold">Household investment</text>
  <text x="440" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4A5A45">Education debt</text>
  <text x="440" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4A5A45">Mortgage · insurance</text>
  <text x="440" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4A5A45">Tenure / career ladder</text>

  <text x="570" y="135" font-family="Arial, sans-serif" font-size="22" fill="#7A8A75">→</text>

  <rect x="600" y="80" width="240" height="100" rx="10" fill="#C8D4C0" stroke="#7A9078"/>
  <text x="720" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2F3D2B" font-weight="bold">Boundary work</text>
  <text x="720" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4A5A45">Compete with peers</text>
  <text x="720" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4A5A45">Protect asset values</text>
  <text x="720" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4A5A45">Block "strivers" below</text>

  <rect x="120" y="210" width="640" height="70" rx="10" fill="#A89080" stroke="#7A6A60"/>
  <text x="440" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff" font-weight="bold">Financialization exposes fragility</text>
  <text x="440" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#F5F0ED">Asset values volatile · debt rises · "security" is ideological</text>

  <rect x="120" y="300" width="640" height="70" rx="10" fill="#7A9078" stroke="#5A6A58"/>
  <text x="440" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff" font-weight="bold">Weiss thesis: never a stable class — an enlistment into accumulation</text>
  <text x="440" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#E8EDE5">Mobility narrative misleads · solidarity undermined · workers remain workers</text>
</svg>
