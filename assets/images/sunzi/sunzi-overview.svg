<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 300" width="920" height="300" role="img" aria-label="孙子兵法 · 十三篇">
  <rect width="920" height="300" rx="12" fill="#F5F7F3" stroke="#C8D4C0"/>
  <text x="460" y="36" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" fill="#4A5A45" font-weight="bold">孙子兵法 · 十三篇</text>
  <defs><marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#7A8A75"/></marker></defs>
  <text x="460" y="58" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#7A8A75">庙算 → 全胜 → 形势 → 虚实 → 地利 → 火攻与用间</text>
  <rect x="50" y="110" width="120" height="50" rx="8" fill="#D4E0D0" stroke="#7A9078"/>
  <text x="110.0" y="140" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2F3D2B" font-weight="bold">庙算</text>
  <line x1="170" y1="135" x2="190" y2="135" stroke="#7A8A75" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="190" y="110" width="120" height="50" rx="8" fill="#D4E0D0" stroke="#7A9078"/>
  <text x="250.0" y="140" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2F3D2B" font-weight="bold">谋攻</text>
  <line x1="310" y1="135" x2="330" y2="135" stroke="#7A8A75" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="330" y="110" width="120" height="50" rx="8" fill="#D4E0D0" stroke="#7A9078"/>
  <text x="390.0" y="140" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2F3D2B" font-weight="bold">形势</text>
  <line x1="450" y1="135" x2="470" y2="135" stroke="#7A8A75" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="470" y="110" width="120" height="50" rx="8" fill="#D4E0D0" stroke="#7A9078"/>
  <text x="530.0" y="140" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2F3D2B" font-weight="bold">虚实</text>
  <line x1="590" y1="135" x2="610" y2="135" stroke="#7A8A75" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="610" y="110" width="120" height="50" rx="8" fill="#D4E0D0" stroke="#7A9078"/>
  <text x="670.0" y="140" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2F3D2B" font-weight="bold">地形</text>
  <line x1="730" y1="135" x2="750" y2="135" stroke="#7A8A75" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="750" y="110" width="120" height="50" rx="8" fill="#D4E0D0" stroke="#7A9078"/>
  <text x="810.0" y="140" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2F3D2B" font-weight="bold">用间</text>
  <text x="460" y="280" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#7A8A75">先胜后战 · 知彼知己 · 因敌制胜</text>
</svg>
