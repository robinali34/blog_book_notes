<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 260" width="880" height="260" role="img" aria-label="Daily one-card tarot practice">
  <rect width="880" height="260" rx="12" fill="#F5F7F3" stroke="#C8D4C0"/>
  <text x="440" y="32" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#4A5A45" font-weight="bold">Daily One-Card Practice</text>
  <text x="440" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7A8A75">morning draw - evening review - weekly pattern</text>
  <rect x="40" y="80" width="180" height="70" rx="8" fill="#D4E0D0" stroke="#7A9078"/>
  <text x="130" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2F3D2B" font-weight="bold">Morning</text>
  <text x="130" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4A5A45">shuffle / one question</text>
  <text x="130" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4A5A45">draw 1 card</text>
  <line x1="220" y1="115" x2="260" y2="115" stroke="#9CB098" stroke-width="2" marker-end="url(#tda)"/>
  <rect x="260" y="80" width="180" height="70" rx="8" fill="#D4E0D0" stroke="#7A9078"/>
  <text x="350" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2F3D2B" font-weight="bold">Record</text>
  <text x="350" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4A5A45">first feeling</text>
  <text x="350" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4A5A45">book meaning</text>
  <line x1="440" y1="115" x2="480" y2="115" stroke="#9CB098" stroke-width="2" marker-end="url(#tda)"/>
  <rect x="480" y="80" width="180" height="70" rx="8" fill="#D4E0D0" stroke="#7A9078"/>
  <text x="570" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2F3D2B" font-weight="bold">Evening</text>
  <text x="570" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4A5A45">what happened</text>
  <text x="570" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4A5A45">match / mismatch</text>
  <line x1="660" y1="115" x2="700" y2="115" stroke="#9CB098" stroke-width="2" marker-end="url(#tda)"/>
  <rect x="700" y="80" width="140" height="70" rx="8" fill="#7A9078"/>
  <text x="770" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#F5F7F3" font-weight="bold">Integrate</text>
  <text x="770" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#E8EDE5">one line lesson</text>
  <defs><marker id="tda" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#9CB098"/></marker></defs>
  <text x="440" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7A8A75" font-style="italic">Mirror, not verdict - see tarot getting started and four lenses</text>
  <text x="440" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7A8A75">Deck: Rider-Waite 1909</text>
</svg>
