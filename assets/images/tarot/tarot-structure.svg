<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" role="img" aria-label="Tarot deck structure">
  <rect width="900" height="360" rx="16" fill="#F5F7F3" stroke="#C8D4C0" stroke-width="1.5"/>
  <text x="450" y="36" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="22" fill="#4A5A45" font-weight="bold">Tarot - 78 Cards</text>
  <text x="450" y="58" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="13" fill="#7A8A75">Major 22 + Minor 56</text>

  <rect x="40" y="80" width="260" height="240" rx="12" fill="#D4E0D0" stroke="#7A9078" stroke-width="2"/>
  <text x="170" y="110" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="16" fill="#2F3D2B" font-weight="bold">Major Arcana</text>
  <text x="170" y="132" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="12" fill="#5A6A58">Da A Ka Na</text>
  <text x="170" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#2F3D2B" font-weight="bold">22</text>
  <text x="170" y="188" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="11" fill="#4A5A45">0 Fool - XXI World</text>
  <text x="170" y="208" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="11" fill="#4A5A45">life archetypes</text>
  <text x="170" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4A5A45">The Fool's Journey</text>

  <rect x="330" y="80" width="530" height="240" rx="12" fill="#E8EDE5" stroke="#B8C8B0" stroke-width="2"/>
  <text x="595" y="110" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="16" fill="#4A5A45" font-weight="bold">Minor Arcana</text>
  <text x="595" y="132" text-anchor="middle" font-family="Noto Sans SC, Arial, sans-serif" font-size="12" fill="#7A8A75">Xiao A Ka Na - 56 cards</text>

  <rect x="360" y="150" width="110" height="70" rx="8" fill="#B8C8B0"/>
  <text x="415" y="178" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="13" fill="#2F3D2B" font-weight="bold">Wands</text>
  <text x="415" y="198" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="10" fill="#4A5A45">Fire / 14</text>

  <rect x="490" y="150" width="110" height="70" rx="8" fill="#B8C8B0"/>
  <text x="545" y="178" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="13" fill="#2F3D2B" font-weight="bold">Cups</text>
  <text x="545" y="198" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="10" fill="#4A5A45">Water / 14</text>

  <rect x="620" y="150" width="110" height="70" rx="8" fill="#B8C8B0"/>
  <text x="675" y="178" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="13" fill="#2F3D2B" font-weight="bold">Swords</text>
  <text x="675" y="198" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="10" fill="#4A5A45">Air / 14</text>

  <rect x="750" y="150" width="90" height="70" rx="8" fill="#B8C8B0"/>
  <text x="795" y="178" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="12" fill="#2F3D2B" font-weight="bold">Pents</text>
  <text x="795" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2F3D2B">Earth</text>
  <text x="795" y="210" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="10" fill="#4A5A45">14 each</text>

  <text x="595" y="260" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="11" fill="#7A8A75">Ace-10 + Page / Knight / Queen / King</text>
  <text x="595" y="282" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="11" fill="#7A8A75">14 x 4 suits = 56</text>

  <text x="450" y="340" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="12" fill="#7A8A75" font-style="italic">22 Major + 56 Minor = 78 cards</text>
</svg>
