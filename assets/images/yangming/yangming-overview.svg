<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" width="900" height="340" role="img" aria-label="阳明心学 · 致良知">
  <rect width="900" height="340" rx="12" fill="#F5F7F3" stroke="#C8D4C0"/>
  <text x="450" y="36" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" fill="#4A5A45" font-weight="bold">阳明心学 · 致良知</text>
  <text x="450" y="58" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#7A8A75">心即理 · 知行合一 · 事上磨练</text>
  <rect x="350" y="80" width="200" height="56" rx="8" fill="#7A9078" stroke="#5A6A58"/>
  <text x="450" y="115" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="15" fill="#F5F7F3" font-weight="bold">此心光明</text>
  <line x1="450" y1="136" x2="450" y2="158" stroke="#9CB098" stroke-width="2"/>
  <rect x="95" y="178" width="140" height="90" rx="8" fill="#D4E0D0" stroke="#7A9078"/>
  <text x="165.0" y="212" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#2F3D2B" font-weight="bold">心即理</text>
  <text x="165.0" y="235" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#4A5A45">理不外求</text>
  <rect x="285" y="178" width="140" height="90" rx="8" fill="#D4E0D0" stroke="#7A9078"/>
  <text x="355.0" y="212" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#2F3D2B" font-weight="bold">致良知</text>
  <text x="355.0" y="235" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#4A5A45">扩充本体</text>
  <rect x="475" y="178" width="140" height="90" rx="8" fill="#D4E0D0" stroke="#7A9078"/>
  <text x="545.0" y="212" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#2F3D2B" font-weight="bold">知行合一</text>
  <text x="545.0" y="235" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#4A5A45">真知即行</text>
  <rect x="665" y="178" width="140" height="90" rx="8" fill="#D4E0D0" stroke="#7A9078"/>
  <text x="735.0" y="212" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#2F3D2B" font-weight="bold">事上磨练</text>
  <text x="735.0" y="235" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="10" fill="#4A5A45">在事体认</text>
  <text x="450" y="310" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#7A8A75">无善无恶心之体 · 为善去恶是格物</text>
</svg>
