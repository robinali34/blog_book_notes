<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280" role="img" aria-label="决策三问">
  <rect width="900" height="280" rx="12" fill="#F5F7F3" stroke="#C8D4C0"/>
  <text x="450" y="36" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" fill="#4A5A45" font-weight="bold">决策三问</text>
  <defs><marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#7A8A75"/></marker></defs>
  <text x="450" y="58" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#7A8A75">势在何处 · 时宜否 · 何者可变</text>
  <rect x="250" y="110" width="120" height="50" rx="8" fill="#D4E0D0" stroke="#7A9078"/>
  <text x="310.0" y="140" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2F3D2B" font-weight="bold">察势</text>
  <line x1="370" y1="135" x2="390" y2="135" stroke="#7A8A75" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="390" y="110" width="120" height="50" rx="8" fill="#D4E0D0" stroke="#7A9078"/>
  <text x="450.0" y="140" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2F3D2B" font-weight="bold">问时</text>
  <line x1="510" y1="135" x2="530" y2="135" stroke="#7A8A75" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="530" y="110" width="120" height="50" rx="8" fill="#D4E0D0" stroke="#7A9078"/>
  <text x="590.0" y="140" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#2F3D2B" font-weight="bold">择变</text>
  <text x="450" y="260" text-anchor="middle" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="#7A8A75">慎言慎行</text>
</svg>
