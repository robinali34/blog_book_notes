  <rect x="580" y="198" width="120" height="44" rx="8" fill="#B8C8B0" stroke="#7A9078"/>
  <text x="640" y="226" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="12" fill="#2F3D2B" font-weight="bold">开国守成</text>
  <rect x="200" y="198" width="120" height="44" rx="8" fill="#B8C8B0" stroke="#7A9078"/>
