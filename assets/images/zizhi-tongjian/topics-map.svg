  <rect x="200" y="128" width="120" height="44" rx="8" fill="#B8C8B0" stroke="#7A9078"/>
  <text x="260" y="156" text-anchor="middle" font-family="Noto Sans SC, sans-serif" font-size="12" fill="#2F3D2B" font-weight="bold">谋断人心</text>
